<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Easy Bookmark home screen." />
    <title>Easy Bookmark</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <main class="home">
      <nav class="home__actions" aria-label="Main menu">
        <button class="action-card youtube" type="button" aria-label="YouTube">
          <svg class="youtube__logo" viewBox="0 0 90 64" aria-hidden="true">
            <path d="M87 14.5a11 11 0 0 0-7.7-7.8C72.5 4.8 45 4.8 45 4.8S17.5 4.8 10.7 6.7A11 11 0 0 0 3 14.5C1 21.3 1 32 1 32s0 10.7 2 17.5a11 11 0 0 0 7.7 7.8C17.5 59.2 45 59.2 45 59.2s27.5 0 34.3-1.9A11 11 0 0 0 87 49.5C89 42.7 89 32 89 32s0-10.7-2-17.5Z" />
            <path class="youtube__play" d="m36 45.6 23-13.6L36 18.4v27.2Z" />
          </svg>
        </button>
        <button class="action-card netflix" type="button" aria-label="Netflix">
          <span aria-hidden="true">NETFLIX</span>
        </button>
        <button class="action-card disney" type="button" aria-label="Disney Plus">
          <span class="disney__arc" aria-hidden="true"></span>
          <span class="disney__word" aria-hidden="true">Disney</span><span class="disney__plus" aria-hidden="true">+</span>
        </button>
      </nav>
      <p class="sr-only" id="selection-message" aria-live="polite"></p>
    </main>
  </body>
</html>
