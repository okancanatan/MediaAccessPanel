<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Easy Bookmark home screen." />
    <title>Easy Bookmark</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <main class="home">
      <nav class="home__actions" aria-label="Main menu">
        <button class="action-card youtube" type="button" aria-label="YouTube">
          <img src="media/youtube.svg" alt="" />
        </button>
        <button class="action-card netflix" type="button" aria-label="Netflix">
          <img src="media/netflix.svg" alt="" />
        </button>
        <button class="action-card disney" type="button" aria-label="Disney Plus">
          <img src="media/disney.svg" alt="" />
        </button>
      </nav>
      <p class="sr-only" id="selection-message" aria-live="polite"></p>
    </main>
  </body>
</html>
